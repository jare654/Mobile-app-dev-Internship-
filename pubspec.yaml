name: news_app
description: PulseNews — A production-grade Flutter news reader app using NewsAPI. Built for AAU Mobile Application Development Assignment 2, Track B.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking (REQUIRED by assignment) ──────────────────────────────────
  http: ^1.2.1                     # All HTTP requests — never Dio

  # ── Security — API Key Management ────────────────────────────────────────
  flutter_dotenv: ^5.1.0           # Load .env without exposing key in code

  # ── External URLs ─────────────────────────────────────────────────────────
  url_launcher: ^6.2.5             # Open full articles in system browser

  # ── State Management ─────────────────────────────────────────────────────
  provider: ^6.1.2                 # ChangeNotifier + Consumer pattern

  # ── UI / UX ───────────────────────────────────────────────────────────────
  shimmer: ^3.0.0                  # Skeleton loading animations
  cached_network_image: ^3.3.1     # Efficient image loading + disk cache
  google_fonts: ^6.2.1             # Premium editorial typography

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0                    # Date formatting ("2 hours ago", etc.)
  shared_preferences: ^2.2.3       # Persistent bookmarks (BONUS)
  share_plus: ^7.2.1               # Native share sheet (Industry Standard)
  path_provider: ^2.1.2            # Local storage for caching
  
  # ── In-App Reader ─────────────────────────────────────────────────────────
  webview_flutter: ^4.7.0          # Native in-app article reading
  webview_flutter_android: ^3.15.0
  webview_flutter_wkwebview: ^3.13.0

  # ── Cloud & Notifications (UI/Architecture ready) ─────────────────────────
  firebase_core: ^3.10.1           # Updated to latest stable
  firebase_auth: ^5.4.1           # Updated to latest stable
  cloud_firestore: ^5.6.1         # Updated to latest stable
  firebase_messaging: ^15.2.1      # Updated to latest stable

  # ── Animation ─────────────────────────────────────────────────────────────
  flutter_staggered_animations: ^1.0.0 # Polished grid entrance

  # ── Dependency Injection ───────────────────────────────────────────────────
  get_it: ^7.6.4                   # Service locator for DI
  injectable: ^2.3.2               # Code generation for DI
  dartz: ^0.10.1                   # Functional programming with Either
  equatable: ^2.0.5                # Value equality
  uuid: ^4.2.1                     # UUID generation

  # ── Advanced Storage ───────────────────────────────────────────────────────
  hive: ^2.2.3                     # Fast key-value database
  hive_flutter: ^1.1.0             # Hive Flutter integration
  json_annotation: ^4.8.1          # JSON serialization code generation

  # ── Security & Authentication ─────────────────────────────────────────────
  crypto: ^3.0.3                   # Cryptographic functions
  flutter_secure_storage: ^9.0.0   # Secure storage for sensitive data
  jwt_decode: ^0.3.0               # JWT token decoding

  # ── Advanced Networking ───────────────────────────────────────────────────
  retry: ^3.1.2                    # Retry mechanism for failed requests
  connectivity_plus: ^5.0.2        # Network connectivity monitoring

  # ── Data Validation ───────────────────────────────────────────────────────
  form_validator: ^2.1.1           # Form validation utilities

  # ── Background Processing ─────────────────────────────────────────────────
  workmanager: ^0.9.0              # Background task scheduling
  background_fetch: ^1.2.1        # Background sync capabilities

  # ── Performance Monitoring ────────────────────────────────────────────────
  device_info_plus: ^9.1.1         # Device information
  package_info_plus: ^4.2.0        # App information

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.8             # Code generation runner
  injectable_generator: ^2.4.1     # DI code generation
  json_serializable: ^6.7.1        # JSON serialization code generation
  hive_generator: ^2.0.1          # Hive code generation
  
  # ── Testing ───────────────────────────────────────────────────────────────
  mockito: ^5.4.4                  # Mocking framework
  network_image_mock: ^2.1.1       # Mock network images in tests
  integration_test:
    sdk: flutter                   # Integration testing
  golden_toolkit: ^0.15.0          # Golden testing for UI
  
  # ── Code Quality ─────────────────────────────────────────────────────────
  coverage: ^1.6.3                # Code coverage reporting

flutter:
  uses-material-design: true

  assets:
    - assets/.env                  # Loaded by flutter_dotenv — NEVER commit the actual .env
    - assets/logo.png
